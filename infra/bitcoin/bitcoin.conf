# Mainnet com prune automático (~15 GiB de blocos brutos; chainstate e SO somam à parte).
# Incompatível com txindex: getrawtransaction só para tx ainda disponíveis no nó (ex.: UTXO).
server=1
listen=1
prune=15000
# VM pequena (ex. t3.micro) com só este compose: menos pico de RAM/CPU na IBD. Sobe dbcache p.ex. a 500 se estiver estável.
dbcache=400
par=1

[main]
rpcbind=0.0.0.0
rpcallowip=10.0.0.0/8
rpcallowip=172.16.0.0/12
rpcallowip=192.168.0.0/16
# rpcuser / rpcpassword: docker-compose (-rpcuser / -rpcpassword) a partir do .env.
zmqpubhashblock=tcp://0.0.0.0:28332
zmqpubhashtx=tcp://0.0.0.0:28332
zmqpubrawblock=tcp://0.0.0.0:28332
zmqpubrawtx=tcp://0.0.0.0:28332
zmqpubsequence=tcp://0.0.0.0:28332
