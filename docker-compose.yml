# Apenas Bitcoin Core — mantém blockchain em volume persistente e rede partilhável.
# Os restantes serviços estão em `stack/docker-compose.yml`.
#
# Subir primeiro (ou criar a rede à mão): este compose cria a rede `bitcoin-coder-net`.
services:
  bitcoind:
    image: bitcoin/bitcoin:31.0  #Versão fixa, comportamento mais previsivel
    container_name: bitcoin-coder-bitcoind
    restart: unless-stopped
    stop_grace_period: 2m
    command:
      - -conf=/bitcoin/bitcoin.conf
      - -printtoconsole=1
      - -rpcuser=${BITCOIN_RPC_USER:-bitcoinrpc}
      - -rpcpassword=${BITCOIN_RPC_PASSWORD:-bitcoinrpcdevpassword}
      - -reindex-chainstate=${BITCOIN_REINDEX_CHAINSTATE:-0}
      - -reindex=${BITCOIN_REINDEX:-0}

    volumes:
      - ./infra/bitcoin/bitcoin.conf:/bitcoin/bitcoin.conf:ro
      - bitcoin-data:/home/bitcoin/.bitcoin
      # AssumeUTXO: snapshot .dat no host (VPS) → /mnt/snapshots. `loadtxoutset /mnt/snapshots/<ficheiro>.dat`
      - /var/projetos/bitcoind-realtime-lab/snapshots:/mnt/snapshots:ro
    ports:
      - "8333:8333"
    expose:
      - "8332"
      - "28332"
    networks:
      bitcoin-coder:
        aliases:
          - bitcoind

networks:
  bitcoin-coder:
    name: bitcoin-coder-net

volumes:
  bitcoin-data:
    # Por omissão: volume actual do projecto. Para recuperar sync antiga num volume já existente,
    # define na raiz no `.env`: BITCOIN_DATA_VOLUME=bitcoind-realtime-lab_bitcoin-data
    # Para nova máquina sem volume: docker volume create bitcoin-coder_bitcoin-data (ou o nome que escolheres).
    name: ${BITCOIN_DATA_VOLUME:-bitcoin-coder_bitcoin-data}
