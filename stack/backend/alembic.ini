# Configuração do Alembic (ferramenta de "migrations" do SQLAlchemy, parecido com o Laravel).
#
# PARA INICIANTES:
# - **script_location**: pasta onde estão `env.py` e `versions/` (cada ficheiro = uma revisão).
# - **version_locations**: onde ficam os ficheiros numerados com o SQL das alterações.
# - A URL da BD em runtime vem de `app.settings` dentro de `alembic/env.py` (não metas
#   passwords reais neste ficheiro).

[alembic]
script_location = alembic
prepend_sys_path = .
version_locations = %(here)s/alembic/versions

# Placeholder; `env.py` substitui pela mesma URL que a app usa (mysql+aiomysql://...).
sqlalchemy.url = mysql+aiomysql://user:pass@localhost/stack

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
