# Stack da app (MariaDB, API, frontend, Caddy). Usa a rede nomeada `bitcoin-coder-net`
# (o mesmo nome que o compose na raiz do bitcoind): é criada aqui se ainda não existir,
# ou junta-se à rede já criada pelo bitcoind.

name: stack

services:
  mariadb:
    image: mariadb:11.4
    container_name: stack-mariadb
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-stack}
      MARIADB_USER: ${MARIADB_USER:-stack}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-stackdevpassword}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-stackrootdevpassword}
    volumes:
      - mariadb-data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: stack-backend
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ./backend:/app
    ports:
      - "${STACK_BACKEND_HOST_PORT:-8200}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - default
      - bitcoin-coder

  frontend:
    build:
      context: ./frontend
    container_name: stack-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${STACK_FRONTEND_HOST_PORT:-5177}:5173"

  caddy:
    image: caddy:2.8
    container_name: stack-caddy
    restart: unless-stopped
    # `environment: ${VAR}` só usa `stack/.env` na interpolação — não lia `../.env`.
    # Ordem: defaults locais, depois `../.env` do repo (domínio DuckDNS, IP público, etc.).
    env_file:
      - ./caddy.defaults.env
      - ../.env
    depends_on:
      - frontend
      - backend
    ports:
      - "${STACK_HTTP_HOST_PORT:-9080}:80"
      - "${STACK_HTTPS_HOST_PORT:-9443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

networks:
  bitcoin-coder:
    name: bitcoin-coder-net

# Nomes fixos para dados persistentes mesmo com projecto Compose `stack`.
# Sem `external`: na primeira `docker compose up` o Docker cria estes volumes automaticamente.
volumes:
  mariadb-data:
    name: bitcoin-coder_mariadb-data
  caddy-data:
    name: bitcoin-coder_caddy-data
  caddy-config:
    name: bitcoin-coder_caddy-config
