# Stack da app (MariaDB, API, frontend, Caddy). Usa a rede nomeada `bitcoin-coder-net`
# (o mesmo nome que o compose na raiz do bitcoind): é criada aqui se ainda não existir,
# ou junta-se à rede já criada pelo bitcoind.
#
# Env: `stack/.env` (esta pasta). O backend também carrega `../.env` na raiz só para
# BITCOIN_RPC_* com o bitcoind. `BITREFILL_*` e resto da stack ficam em `stack/.env`.

name: stack

services:
  mariadb:
    image: mariadb:11.4
    container_name: stack-mariadb
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      # TablePlus: localhost:${STACK_MARIADB_HOST_PORT:-3306}
      - "${STACK_MARIADB_HOST_PORT:-3306}:3306"
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  backend:
    build:
      context: ./backend
    container_name: stack-backend
    restart: unless-stopped
    # Raiz: RPC user/pass iguais ao bitcoind; esta pasta: MariaDB, SECRET_KEY, ADM, portas em ${}.
    env_file:
      - path: ../.env
        required: false
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "${STACK_BACKEND_HOST_PORT:-8200}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - default
      - bitcoin-coder

  frontend:
    build:
      context: ./frontend
    container_name: stack-frontend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Código local (hot reload); node_modules fica no volume anónimo da imagem.
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    ports:
      - "${STACK_FRONTEND_HOST_PORT:-5177}:5173"

  caddy:
    image: caddy:2.8
    container_name: stack-caddy
    restart: unless-stopped
    env_file:
      - ./caddy.defaults.env
      - .env
    depends_on:
      - frontend
      - backend
    ports:
      - "${STACK_HTTP_HOST_PORT:-9080}:80"
      - "${STACK_HTTPS_HOST_PORT:-9443}:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

networks:
  # Partilhada com o bitcoind (compose na raiz). Cria antes se só subires o stack:
  #   docker network create bitcoin-coder-net
  bitcoin-coder:
    name: bitcoin-coder-net
    external: true

volumes:
  mariadb-data:
    name: bitcoin-coder_mariadb-data
  caddy-data:
    name: bitcoin-coder_caddy-data
  caddy-config:
    name: bitcoin-coder_caddy-config
